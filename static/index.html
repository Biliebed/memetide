<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeTide - AI Memecoin Trend Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .wave {
            display: inline-block;
            animation: wave 2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        .tagline {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .scan-form {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .scan-meta {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meta-label {
            font-weight: 600;
            color: #666;
        }

        .meta-value {
            color: #333;
        }

        .prediction {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .prediction::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: #ccc;
        }

        .prediction.high::before {
            background: linear-gradient(180deg, #10b981 0%, #059669 100%);
        }

        .prediction.medium::before {
            background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%);
        }

        .prediction.low::before {
            background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
        }

        .prediction:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .prediction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .token-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .token-symbol {
            font-size: 1.5em;
            font-weight: 700;
            color: #333;
        }

        .confidence-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .confidence-badge.high {
            background: #d1fae5;
            color: #065f46;
        }

        .confidence-badge.medium {
            background: #fef3c7;
            color: #92400e;
        }

        .confidence-badge.low {
            background: #fee2e2;
            color: #991b1b;
        }

        .score-display {
            font-size: 2em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .prediction-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .stat {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
        }

        .onchain-metrics {
            background: #f0f9ff;
            border: 2px solid #bfdbfe;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .onchain-title {
            font-weight: 600;
            color: #1e40af;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .onchain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .error {
            background: #fee2e2;
            border: 2px solid #fca5a5;
            border-radius: 8px;
            padding: 20px;
            color: #991b1b;
            margin-bottom: 20px;
        }

        .error-title {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.9;
        }

        footer a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .scan-form {
                flex-direction: column;
            }

            .prediction-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="wave">🌊</span> MemeTide</h1>
            <p class="tagline">AI-Powered Memecoin Trend Predictor</p>
        </header>

        <div class="card">
            <h2 style="margin-bottom: 20px;">Scan Trending Memecoins</h2>
            
            <form id="scanForm" class="scan-form">
                <div class="form-group">
                    <label for="minMentions">Min Mentions</label>
                    <input type="number" id="minMentions" min="1" max="100" value="3">
                </div>

                <div class="form-group">
                    <label for="topN">Top N Results</label>
                    <input type="number" id="topN" min="1" max="50" value="10">
                </div>

                <div class="form-group">
                    <label for="mockData">Data Source</label>
                    <select id="mockData">
                        <option value="true">Mock Data (Fast)</option>
                        <option value="false">Real Twitter (Slow)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fetchOnchain">On-Chain Metrics</label>
                    <select id="fetchOnchain">
                        <option value="true">Enabled</option>
                        <option value="false">Disabled</option>
                    </select>
                </div>

                <div class="form-group" style="display: flex; align-items: flex-end;">
                    <button type="submit" id="scanBtn">🚀 Start Scan</button>
                </div>
            </form>
        </div>

        <div id="loading" class="card loading" style="display: none;">
            <div class="spinner"></div>
            <p>Analyzing memecoin trends...</p>
        </div>

        <div id="error" class="error" style="display: none;">
            <div class="error-title">❌ Error</div>
            <div id="errorMessage"></div>
        </div>

        <div id="results" class="card results">
            <h2 style="margin-bottom: 20px;">📊 Scan Results</h2>
            
            <div id="scanMeta" class="scan-meta"></div>
            
            <div id="predictions"></div>
            
            <div id="noResults" class="no-results" style="display: none;">
                <p>No trending tokens found. Try lowering the minimum mentions threshold.</p>
            </div>
        </div>

        <footer>
            <p>Built for <a href="https://okx.ai" target="_blank">OKX.AI Genesis Hackathon 2026</a></p>
            <p style="margin-top: 10px; font-size: 0.9em;">
                <a href="/docs" target="_blank">API Docs</a> | 
                <a href="https://github.com/Biliebed/memetide" target="_blank">GitHub</a>
            </p>
        </footer>
    </div>

    <script>
        const API_BASE = window.location.origin;

        document.getElementById('scanForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const minMentions = parseInt(document.getElementById('minMentions').value);
            const topN = parseInt(document.getElementById('topN').value);
            const mockData = document.getElementById('mockData').value === 'true';
            const fetchOnchain = document.getElementById('fetchOnchain').value === 'true';
            
            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').classList.remove('show');
            document.getElementById('error').style.display = 'none';
            document.getElementById('scanBtn').disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/scan`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        min_mentions: minMentions,
                        top_n: topN,
                        use_mock_data: mockData,
                        fetch_onchain: fetchOnchain
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const result = await response.json();
                
                // Hide loading
                document.getElementById('loading').style.display = 'none';
                document.getElementById('scanBtn').disabled = false;
                
                // Display results
                displayResults(result.data);
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('scanBtn').disabled = false;
                document.getElementById('error').style.display = 'block';
                document.getElementById('errorMessage').textContent = error.message;
            }
        });
        
        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            const metaDiv = document.getElementById('scanMeta');
            const predictionsDiv = document.getElementById('predictions');
            const noResultsDiv = document.getElementById('noResults');
            
            // Display meta info
            metaDiv.innerHTML = `
                <div class="meta-item">
                    <span class="meta-label">Scan ID:</span>
                    <span class="meta-value">${data.scan_id}</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Duration:</span>
                    <span class="meta-value">${data.duration_seconds.toFixed(2)}s</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Total Mentions:</span>
                    <span class="meta-value">${data.total_mentions}</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Tokens Found:</span>
                    <span class="meta-value">${data.unique_tokens}</span>
                </div>
            `;
            
            // Display predictions
            if (data.predictions.length === 0) {
                noResultsDiv.style.display = 'block';
                predictionsDiv.innerHTML = '';
            } else {
                noResultsDiv.style.display = 'none';
                predictionsDiv.innerHTML = data.predictions.map((pred, index) => {
                    const emoji = pred.confidence === 'high' ? '🔥' : pred.confidence === 'medium' ? '⚠️' : '❌';
                    
                    let onchainHtml = '';
                    if (pred.metrics) {
                        const m = pred.metrics;
                        onchainHtml = `
                            <div class="onchain-metrics">
                                <div class="onchain-title">📊 On-Chain Metrics</div>
                                <div class="onchain-grid">
                                    ${m.price_usd ? `<div class="stat"><div class="stat-label">Price</div><div class="stat-value">$${m.price_usd.toFixed(8)}</div></div>` : ''}
                                    ${m.market_cap ? `<div class="stat"><div class="stat-label">Market Cap</div><div class="stat-value">$${formatNumber(m.market_cap)}</div></div>` : ''}
                                    ${m.liquidity ? `<div class="stat"><div class="stat-label">Liquidity</div><div class="stat-value">$${formatNumber(m.liquidity)}</div></div>` : ''}
                                    ${m.age_hours ? `<div class="stat"><div class="stat-label">Age</div><div class="stat-value">${formatAge(m.age_hours)}</div></div>` : ''}
                                </div>
                            </div>
                        `;
                    }
                    
                    return `
                        <div class="prediction ${pred.confidence}">
                            <div class="prediction-header">
                                <div class="token-info">
                                    <span>${emoji}</span>
                                    <span class="token-symbol">${index + 1}. $${pred.token_symbol}</span>
                                </div>
                                <div>
                                    <span class="confidence-badge ${pred.confidence}">${pred.confidence}</span>
                                    <span class="score-display">${pred.score.toFixed(1)}/100</span>
                                </div>
                            </div>
                            
                            <div class="prediction-stats">
                                <div class="stat">
                                    <div class="stat-label">Mentions</div>
                                    <div class="stat-value">${pred.mention_count} (${pred.mentions_per_hour.toFixed(1)}/hr)</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-label">Sentiment</div>
                                    <div class="stat-value">${(pred.sentiment.positive * 100).toFixed(1)}% positive</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-label">Risk Level</div>
                                    <div class="stat-value">${pred.risk_level.toUpperCase()}</div>
                                </div>
                            </div>
                            
                            ${onchainHtml}
                        </div>
                    `;
                }).join('');
            }
            
            resultsDiv.classList.add('show');
        }
        
        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(0);
        }
        
        function formatAge(hours) {
            const days = Math.floor(hours / 24);
            const hrs = Math.floor(hours % 24);
            if (days > 0) return `${days}d ${hrs}h`;
            return `${hrs}h`;
        }
    </script>
</body>
</html>
